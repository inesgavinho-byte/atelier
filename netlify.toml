# ATELIER — Netlify deploy configuration
#
# The Next.js app lives in apps/web (npm workspaces monorepo). Netlify builds
# from that directory; the @netlify/plugin-nextjs runtime handles the dynamic
# (server-rendered) Mission Control pages.
#
# Required environment variables (set in the Netlify UI → Site settings →
# Environment variables — NOT committed):
#   SUPABASE_URL        = https://gfrfzsiqhiqggwxjptxh.supabase.co
#   SUPABASE_ANON_KEY   = <publishable/anon key for the "Atelier" project>
#
# These names match what the code reads (server-only, see src/lib/supabase.ts).
# NEXT_PUBLIC_* names would NOT be read by the current code.

[build]
  base = "apps/web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
